<style>*{box-sizing:border-box}
:root{--bg:#e9ddbe;--bg2:#f0e7cf;--card:#f6efdb;--card2:#efe4c6;--border:#d2be92;--ink:#2b2416;--soft:#6a5c3d;--faint:#94835d;--gold:#8f6d1f;--gold2:#a9822c;--rule:#cbb582;--c-attr:#3a6693;--c-passive:#4a8036;--c-aura:#1f8378;--c-context:#6f4ea3;--c-active:#b56417;--c-archery:#8f6230;--c-visual:#9c7c14;--good:#3a6693;--evil:#a44a2f;--bad:#a13b2a;--link:#c3ab77;--shadow:0 1px 2px rgba(70,50,15,.10),0 6px 20px rgba(70,50,15,.07);--serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;--maxw:1200px}
@media (prefers-color-scheme:dark){:root{--bg:#14110c;--bg2:#1b1710;--card:#231e15;--card2:#2b2418;--border:#3b3122;--ink:#ede3cd;--soft:#b6a888;--faint:#8a7c60;--gold:#d8b45f;--gold2:#e9c979;--rule:#4a3d28;--c-attr:#7fb0dd;--c-passive:#8fca79;--c-aura:#57c3b6;--c-context:#bf9be0;--c-active:#eaa85f;--c-archery:#d3a06f;--c-visual:#ecd06a;--good:#86b2d8;--evil:#dd8062;--bad:#e08a6c;--link:#4a3d28;--shadow:0 1px 2px rgba(0,0,0,.35),0 8px 26px rgba(0,0,0,.30);}}
:root[data-theme="light"]{--bg:#e9ddbe;--bg2:#f0e7cf;--card:#f6efdb;--card2:#efe4c6;--border:#d2be92;--ink:#2b2416;--soft:#6a5c3d;--faint:#94835d;--gold:#8f6d1f;--gold2:#a9822c;--rule:#cbb582;--c-attr:#3a6693;--c-passive:#4a8036;--c-aura:#1f8378;--c-context:#6f4ea3;--c-active:#b56417;--c-archery:#8f6230;--c-visual:#9c7c14;--good:#3a6693;--evil:#a44a2f;--bad:#a13b2a;--link:#c3ab77;--shadow:0 1px 2px rgba(70,50,15,.10),0 6px 20px rgba(70,50,15,.07);}
:root[data-theme="dark"]{--bg:#14110c;--bg2:#1b1710;--card:#231e15;--card2:#2b2418;--border:#3b3122;--ink:#ede3cd;--soft:#b6a888;--faint:#8a7c60;--gold:#d8b45f;--gold2:#e9c979;--rule:#4a3d28;--c-attr:#7fb0dd;--c-passive:#8fca79;--c-aura:#57c3b6;--c-context:#bf9be0;--c-active:#eaa85f;--c-archery:#d3a06f;--c-visual:#ecd06a;--good:#86b2d8;--evil:#dd8062;--bad:#e08a6c;--link:#4a3d28;--shadow:0 1px 2px rgba(0,0,0,.35),0 8px 26px rgba(0,0,0,.30);}
html{scroll-behavior:smooth}@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule)}
.topin{max-width:var(--maxw);margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-family:var(--serif);font-size:19px;color:var(--gold);font-weight:600;margin-right:auto;line-height:1.05}
.brand small{display:block;font-family:var(--sans);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);font-weight:600}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.tab{border:0;background:transparent;color:var(--soft);font:inherit;font-size:13px;font-weight:600;padding:6px 13px;border-radius:8px;cursor:pointer}
.tab.on{background:var(--gold);color:#1a1509}
.search{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:6px 10px;min-width:150px}
.search input{border:0;background:transparent;color:var(--ink);font:inherit;outline:none;width:100%}
.search svg{width:14px;height:14px;color:var(--faint);flex:none}
.iconbtn{background:var(--card);border:1px solid var(--border);color:var(--soft);border-radius:9px;padding:6px 11px;cursor:pointer;font:inherit;font-weight:600;font-size:13px}
.iconbtn:hover{color:var(--gold);border-color:var(--gold)}
main{max-width:var(--maxw);margin:0 auto;padding:18px 20px 60px}
.hide{display:none!important}
/* racebar */
.racebar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.rchip{font-size:13px;font-weight:600;padding:6px 13px;border-radius:22px;border:1px solid var(--border);background:var(--card);color:var(--soft);cursor:pointer}
.rchip.a-good{--a:var(--good)}.rchip.a-evil{--a:var(--evil)}
.rchip:hover{border-color:var(--a);color:var(--a)}
.rchip.on{background:var(--a);border-color:var(--a);color:#fff}
/* race head */
.rhead2{display:flex;align-items:flex-end;gap:16px;border-bottom:2px solid var(--rule);padding-bottom:12px;position:relative;margin-bottom:14px}
.rhead2:before{content:"";position:absolute;left:-20px;top:4px;bottom:12px;width:4px;border-radius:3px;background:var(--a)}
.a-good{--a:var(--good)}.a-evil{--a:var(--evil)}
.alleg{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--a);font-weight:700}
.rhead2 h2{font-family:var(--serif);font-size:32px;margin:2px 0 4px;color:var(--gold);letter-spacing:.4px;line-height:1.05;text-wrap:balance}
.rhead2 p{margin:0;color:var(--soft);max-width:74ch;font-size:14px}
.rmeta{margin-left:auto;text-align:right;flex:none}
.rmeta b{font-family:var(--serif);font-size:28px;color:var(--gold);display:block;font-variant-numeric:tabular-nums;line-height:1}
.rmeta span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.birth{margin:0 0 18px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:11px}
.bl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700}
.btwrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.bt{font-size:12px;padding:3px 9px;border-radius:7px;border:1px solid var(--border);background:var(--card)}
.bt-good{color:var(--c-passive)}.bt-ctx{color:var(--c-context)}.bt-bad{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 40%,var(--border))}
/* tree graph */
.disc2{margin:8px 0 30px}
.disc2>h3{font-family:var(--serif);font-size:19px;color:var(--gold2);margin:0 0 4px;font-weight:600}
.disc2>h3 em{font-style:normal;font-size:12px;color:var(--faint);font-family:var(--sans);margin-left:6px}
.gwrap{overflow-x:auto;padding:6px 0 4px}
.graph{position:relative;margin:0 auto}
.links{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
.links path{fill:none;stroke:var(--link);stroke-width:2;opacity:.85}
.tnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;
  background:transparent;border:0;cursor:pointer;width:118px;padding:0;font:inherit;color:var(--ink)}
.orb{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:15px;
  background:var(--card2);border:2.5px solid var(--bc);color:var(--bc);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;transition:.13s}
.tnode.t-b-attr{--bc:var(--c-attr)}.tnode.t-b-passive{--bc:var(--c-passive)}.tnode.t-b-aura{--bc:var(--c-aura)}
.tnode.t-b-context{--bc:var(--c-context)}.tnode.t-b-active{--bc:var(--c-active)}.tnode.t-b-archery{--bc:var(--c-archery)}
.tnode.t-b-active .orb{background:var(--c-active);color:#1a1206}
.tnode.excl .orb{border-style:double;border-width:4px}
.tlab{font-size:11.5px;line-height:1.2;text-align:center;color:var(--soft);max-width:116px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tnode:hover .orb,.tnode:focus-visible .orb{transform:scale(1.12);box-shadow:0 0 0 4px color-mix(in srgb,var(--bc) 28%,transparent),var(--shadow)}
.tnode:hover .tlab,.tnode:focus-visible .tlab{color:var(--ink)}
.tnode:focus{outline:none}
.tnode.dim{opacity:.28}.tnode.match .orb{box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 45%,transparent),var(--shadow)}
/* tooltip */
#tip{position:fixed;z-index:50;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 10px 34px rgba(0,0,0,.32);padding:12px 13px;pointer-events:none;opacity:0;transition:opacity .12s;font-size:13px}
#tip.on{opacity:1}
#tip h4{margin:0 0 8px;font-size:15px;color:var(--ink)}
#tip .chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
#tip .req{margin:8px 0 0;font-size:12px;color:var(--faint)}
/* shared badge/chip/eff */
.chip{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:6px;white-space:nowrap;background:var(--bg2);border:1px solid var(--border);color:var(--faint);font-variant-numeric:tabular-nums}
.chip.tier{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 45%,var(--border))}
.chip.excl{color:var(--c-active);border-color:color-mix(in srgb,var(--c-active) 45%,var(--border));text-transform:uppercase}
.eff{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.eff li{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:baseline;color:var(--soft)}
.eff li.vis .etx:after{content:"◉";color:var(--c-visual);font-size:10px;margin-left:6px}
.bdg{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:5px;white-space:nowrap;color:#fff;text-align:center;line-height:1.55}
.etx{color:var(--ink)}
.cd{font-size:10px;font-weight:700;color:var(--c-active);background:color-mix(in srgb,var(--c-active) 15%,transparent);border-radius:5px;padding:1px 6px;margin-right:3px;white-space:nowrap}
.b-attr .bdg,.dot.b-attr{background:var(--c-attr)}.b-passive .bdg,.dot.b-passive{background:var(--c-passive)}
.b-aura .bdg,.dot.b-aura{background:var(--c-aura)}.b-context .bdg,.dot.b-context{background:var(--c-context)}
.b-active .bdg,.dot.b-active{background:var(--c-active)}.b-archery .bdg,.dot.b-archery{background:var(--c-archery)}
/* legend */
.legend{display:flex;flex-wrap:wrap;gap:8px 15px;align-items:center;color:var(--faint);font-size:12.5px;margin:0 0 16px}
.legend b{color:var(--soft);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:11px}
.lg{display:inline-flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
/* list view */
.disc{margin:14px 0;border:1px solid var(--border);border-radius:13px;overflow:hidden;background:var(--bg2)}
.disc>summary{cursor:pointer;list-style:none;padding:11px 15px;display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:17px;color:var(--gold2);font-weight:600}
.disc>summary::-webkit-details-marker{display:none}
.disc>summary:before{content:"▸";color:var(--faint);font-size:12px;transition:.15s}
.disc[open]>summary:before{transform:rotate(90deg)}
.dcount{margin-left:auto;font-size:11px;color:var(--faint);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2px 9px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:2px 14px 15px}
.node{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:9px}
.nhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.nhead h4{margin:0;font-size:15px;font-weight:700;color:var(--ink);line-height:1.25}
.nhead .chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex:none}
.flav{margin:0;font-style:italic;color:var(--faint);font-size:12.5px;border-left:2px solid var(--rule);padding-left:9px}
.listrace{font-family:var(--serif);color:var(--gold);font-size:24px;margin:26px 0 2px;border-bottom:2px solid var(--rule);padding-bottom:6px}
/* compare */
.cmp{overflow-x:auto}
table.compare{border-collapse:collapse;width:100%;min-width:720px;font-size:13.5px}
.compare th{text-align:left;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:9px 12px;border-bottom:2px solid var(--rule)}
.compare td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.compare tr.a-good .camp{color:var(--good)}.compare tr.a-evil .camp{color:var(--evil)}
.compare .camp{font-weight:700;font-size:12px}
.cr-name a{font-family:var(--serif);font-size:17px;color:var(--gold);font-weight:600}
.cr-n{font-variant-numeric:tabular-nums;font-weight:700;color:var(--gold2)}
.nores{text-align:center;color:var(--faint);padding:40px;display:none}
footer{color:var(--faint);font-size:12px;text-align:center;padding:26px 20px 40px;border-top:1px solid var(--rule);margin-top:20px}
@media(max-width:640px){.rhead2 h2{font-size:24px}.rmeta{display:none}.cards{grid-template-columns:1fr}.brand small{display:none}}
</style>

const LAB={'b-attr':{ru:'атрибут',en:'attribute'},'b-passive':{ru:'пассив',en:'passive'},'b-aura':{ru:'аура',en:'aura'},'b-context':{ru:'контекст',en:'context'},'b-active':{ru:'актив',en:'active'},'b-archery':{ru:'стрельба',en:'archery'}};
const UI={search:{ru:'Поиск по узлам и эффектам…',en:'Search nodes and effects…'},legend:{ru:'Легенда',en:'Legend'},visual:{ru:'◉ визуальный эффект',en:'◉ visual effect'},innate:{ru:'Врождённые черты',en:'Innate traits'},nodes:{ru:'узлов',en:'nodes'},req:{ru:'Требуется',en:'Requires'},foot:{ru:'узла · 8 рас · сгенерировано из данных мода',en:'nodes · 8 races · generated from mod data'},none:{ru:'Ничего не найдено',en:'No matches'},thRace:{ru:'Раса',en:'Race'},thCamp:{ru:'Лагерь',en:'Camp'},thRole:{ru:'Роль',en:'Role'},thStr:{ru:'Сильные стороны',en:'Strengths'},thSun:{ru:'Свет · Тьма',en:'Sun · Dark'},thN:{ru:'Узлов',en:'Nodes'},lv:{ru:'Ур.',en:'Lv.'},pts:{ru:'оч.',en:'pts'},excl:{ru:'эксклюзив',en:'exclusive'}};
const root=document.documentElement, view=document.getElementById('view'), tip=document.getElementById('tip'), q=document.getElementById('q'), nores=document.getElementById('nores');
let S={lang:'ru',view:'tree',race:DATA.races[0].id};
const NMAP={}; DATA.races.forEach(r=>r.disc.forEach(d=>d.nodes.forEach(n=>NMAP[n.id]=n)));
const L=o=>o?o[S.lang]:''; const E=(f,k)=>S.lang==='ru'?f[k+'r']||f.r:f[k+'e']||f.e;
const er=f=>S.lang==='ru'?f.r:f.e;
function effHtml(f){const cd=f.x?'<span class="cd">⟳ '+(S.lang==='ru'?f.x[0]:f.x[1])+'</span>':'';return '<li class="'+f.bc+(f.v?' vis':'')+'"><span class="bdg '+f.bc+'">'+L(LAB[f.bc])+'</span><span class="etx">'+cd+er(f)+'</span></li>';}
function chips(n){let c='<span class="chip tier">'+L(UI.lv)+' '+n.tier+'</span><span class="chip">'+n.cost+' '+L(UI.pts)+'</span>';if(n.excl)c+='<span class="chip excl">'+L(UI.excl)+'</span>';return c;}
function legend(){document.getElementById('legend').innerHTML='<b>'+L(UI.legend)+'</b>'+Object.keys(LAB).map(k=>'<span class="lg"><span class="dot '+k+'"></span>'+L(LAB[k])+'</span>').join('')+'<span class="lg"><span class="dot" style="background:var(--c-visual)"></span>'+L(UI.visual)+'</span>';}
function graph(d){const cg=158,rg=116,px=78,py=60;const maxT=Math.max.apply(0,d.nodes.map(n=>n.tier));const X=c=>px+(c+1)*cg,Y=t=>py+(t-1)*rg;const W=px*2+2*cg,H=py*2+(maxT-1)*rg;const by={};d.nodes.forEach(n=>by[n.id]=n);let lines='';d.nodes.forEach(n=>n.pre.forEach(p=>{const pr=by[p];if(!pr)return;const x1=X(pr.col),y1=Y(pr.tier),x2=X(n.col),y2=Y(n.tier),my=(y1+y2)/2;lines+='<path d="M'+x1+' '+y1+' C '+x1+' '+my+', '+x2+' '+my+', '+x2+' '+y2+'"/>';}));let nodes='';d.nodes.forEach(n=>{nodes+='<button class="tnode t-'+n.t+(n.excl?' excl':'')+'" style="left:'+X(n.col)+'px;top:'+Y(n.tier)+'px" data-nid="'+n.id+'"><span class="orb">'+n.tier+'</span><span class="tlab">'+L(n.name)+'</span></button>';});return '<section class="disc2"><h3>'+L(d.name)+'<em>'+d.nodes.length+'</em></h3><div class="gwrap"><div class="graph" style="width:'+W+'px;height:'+H+'px"><svg class="links" width="'+W+'" height="'+H+'">'+lines+'</svg>'+nodes+'</div></div></section>';}
function renderTree(){const r=DATA.races.find(x=>x.id===S.race);let h='<div class="racebar">'+DATA.races.map(x=>'<button class="rchip a-'+x.align+(x.id===S.race?' on':'')+'" data-race="'+x.id+'">'+L(x.name)+'</button>').join('')+'</div>';h+='<div class="rhead2 a-'+r.align+'"><div><span class="alleg">'+L(r.alleg)+'</span><h2>'+L(r.name)+'</h2><p>'+L(r.desc)+'</p></div><div class="rmeta"><b>'+r.count+'</b><span>'+L(UI.nodes)+'</span></div></div>';h+='<div class="birth"><span class="bl">'+L(UI.innate)+'</span><div class="btwrap">'+r.birth.map(b=>'<span class="bt bt-'+b.c+'">'+(S.lang==='ru'?b.r:b.e)+'</span>').join('')+'</div></div>';h+=r.disc.map(graph).join('');view.innerHTML=h;}
function renderList(){let h='';DATA.races.forEach(r=>{h+='<h2 class="listrace a-'+r.align+'" id="lr-'+r.id+'">'+L(r.name)+'</h2>';r.disc.forEach(d=>{const cards=d.nodes.map(n=>'<article class="node"><div class="nhead"><h4>'+L(n.name)+'</h4><div class="chips">'+chips(n)+'</div></div><ul class="eff">'+n.eff.map(effHtml).join('')+'</ul>'+(L(n.flav)?'<p class="flav">'+L(n.flav)+'</p>':'')+'</article>').join('');h+='<details class="disc" open><summary><span>'+L(d.name)+'</span><span class="dcount">'+d.nodes.length+'</span></summary><div class="cards">'+cards+'</div></details>';});});view.innerHTML=h;}
function renderCompare(){let h='<div class="cmp"><table class="compare"><thead><tr><th>'+L(UI.thRace)+'</th><th>'+L(UI.thCamp)+'</th><th>'+L(UI.thRole)+'</th><th>'+L(UI.thStr)+'</th><th>'+L(UI.thSun)+'</th><th>'+L(UI.thN)+'</th></tr></thead><tbody>';DATA.races.forEach(r=>{h+='<tr class="a-'+r.align+'"><td class="cr-name"><a href="#" data-goto="'+r.id+'">'+L(r.name)+'</a></td><td><span class="camp">'+L(r.alleg)+'</span></td><td>'+L(r.role)+'</td><td>'+L(r.str)+'</td><td>'+L(r.sun)+'</td><td class="cr-n">'+r.count+'</td></tr>';});h+='</tbody></table></div>';view.innerHTML=h;}
function render(){legend();document.getElementById('legend').classList.toggle('hide',S.view==='compare');if(S.view==='tree')renderTree();else if(S.view==='list')renderList();else renderCompare();document.getElementById('foot').textContent=DATA.races.reduce((a,r)=>a+r.count,0)+' '+L(UI.foot);filter();}
// tooltip
function showTip(n,el){const r=el.getBoundingClientRect();let req='';const names=n.preAll.map(p=>NMAP[p]?L(NMAP[p].name):null).filter(Boolean);if(names.length)req='<p class="req">'+L(UI.req)+': '+names.join(', ')+'</p>';tip.innerHTML='<h4>'+L(n.name)+'</h4><div class="chips">'+chips(n)+'</div><ul class="eff">'+n.eff.map(effHtml).join('')+'</ul>'+(L(n.flav)?'<p class="flav" style="margin-top:8px">'+L(n.flav)+'</p>':'')+req;tip.classList.add('on');const tw=tip.offsetWidth,th=tip.offsetHeight;let x=r.right+12,y=r.top;if(x+tw>innerWidth-10)x=r.left-tw-12;if(x<10)x=10;if(y+th>innerHeight-10)y=innerHeight-th-10;if(y<10)y=10;tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.classList.remove('on');}
document.addEventListener('mouseover',e=>{const t=e.target.closest('.tnode');if(t)showTip(NMAP[t.dataset.nid],t);});
document.addEventListener('mouseout',e=>{if(e.target.closest('.tnode'))hideTip();});
document.addEventListener('focusin',e=>{const t=e.target.closest('.tnode');if(t)showTip(NMAP[t.dataset.nid],t);});
document.addEventListener('focusout',e=>{if(e.target.closest('.tnode'))hideTip();});
// interactions
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{S.view=b.dataset.view;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));render();window.scrollTo(0,0);}));
view.addEventListener('click',e=>{const rc=e.target.closest('[data-race]');if(rc){S.race=rc.dataset.race;renderTree();filter();return;}const gt=e.target.closest('[data-goto]');if(gt){e.preventDefault();S.view='tree';S.race=gt.dataset.goto;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.view==='tree'));render();window.scrollTo(0,0);}});
document.getElementById('lang').addEventListener('click',()=>{S.lang=S.lang==='ru'?'en':'ru';document.getElementById('lang').textContent=S.lang==='ru'?'EN':'RU';document.querySelectorAll('[data-ru]').forEach(el=>el.textContent=el.getAttribute('data-'+S.lang));q.setAttribute('placeholder',L(UI.search));render();});
document.getElementById('theme').addEventListener('click',()=>{const cur=root.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');root.setAttribute('data-theme',cur==='dark'?'light':'dark');});
q.addEventListener('input',filter);
function filter(){const t=q.value.trim().toLowerCase();if(S.view==='tree'){document.querySelectorAll('.tnode').forEach(el=>{const n=NMAP[el.dataset.nid];const hay=(L(n.name)+' '+n.eff.map(er).join(' ')+' '+L(n.flav)).toLowerCase();el.classList.toggle('match',!!t&&hay.includes(t));el.classList.toggle('dim',!!t&&!hay.includes(t));});nores.style.display='none';}else if(S.view==='list'){let any=false;document.querySelectorAll('.node').forEach(c=>{const m=!t||c.textContent.toLowerCase().includes(t);c.classList.toggle('hide',!m);if(m)any=true;});document.querySelectorAll('.disc').forEach(d=>{const v=d.querySelectorAll('.node:not(.hide)').length;d.classList.toggle('hide',v===0);if(t)d.open=true;});document.querySelectorAll('.listrace').forEach(h=>{let el=h.nextElementSibling,vis=false;while(el&&el.classList.contains('disc')){if(!el.classList.contains('hide'))vis=true;el=el.nextElementSibling;}h.classList.toggle('hide',!vis);});nores.textContent=L(UI.none);nores.style.display=any?'none':'block';}else{nores.style.display='none';}}
q.setAttribute('placeholder',L(UI.search));
render();
</script>
