<title>Kindreds of Middle-earth — Skill Tree Explorer</title>
<style>
/* ---------- tokens ------------------------------------------------------- */
:root{
  color-scheme: dark light;
  --accent:#B8D8E8; --accent2:#4A7A96;
  --ink:#0B0E14; --ink-2:#111621; --ink-3:#171E2B;
  --vellum:#E7E4DB; --vellum-dim:#A7A79F; --vellum-faint:#6E7280;
  --rule:#232B3A; --rule-soft:#1A2130;
  --good:#7FBF6A; --warn:#D8A64A; --bad:#C4584A;
  --shadow:0 18px 48px -24px #000A;
  --display:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --ui:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"Cascadia Mono",Consolas,"SF Mono",monospace;
  --r:10px;
}
@media (prefers-color-scheme: light){
  :root{
    --ink:#EAEAE4; --ink-2:#F3F2ED; --ink-3:#FFFFFF;
    --vellum:#171A20; --vellum-dim:#4C525E; --vellum-faint:#7E838D;
    --rule:#D3D2CA; --rule-soft:#E2E1DA;
    --shadow:0 18px 40px -28px #4448;
  }
}
:root[data-theme="dark"]{
  --ink:#0B0E14; --ink-2:#111621; --ink-3:#171E2B;
  --vellum:#E7E4DB; --vellum-dim:#A7A79F; --vellum-faint:#6E7280;
  --rule:#232B3A; --rule-soft:#1A2130; --shadow:0 18px 48px -24px #000A;
}
:root[data-theme="light"]{
  --ink:#EAEAE4; --ink-2:#F3F2ED; --ink-3:#FFFFFF;
  --vellum:#171A20; --vellum-dim:#4C525E; --vellum-faint:#7E838D;
  --rule:#D3D2CA; --rule-soft:#E2E1DA; --shadow:0 18px 40px -28px #4448;
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--ink); color:var(--vellum); font-family:var(--ui);
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
  transition:background .5s ease,color .35s ease;
}
h1,h2,h3{font-family:var(--display); font-weight:600; text-wrap:balance; margin:0}
a{color:var(--accent)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- ambient starfield ------------------------------------------- */
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
@media (prefers-color-scheme: light){#sky{opacity:.18}}
:root[data-theme="light"] #sky{opacity:.18}
:root[data-theme="dark"] #sky{opacity:.55}

/* ---------- shell -------------------------------------------------------- */
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 20px 64px}
header.top{padding:34px 0 18px}
.brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand h1{font-size:clamp(26px,3.6vw,40px);letter-spacing:.01em;line-height:1.05}
.brand .sub{font-family:var(--display);font-style:italic;color:var(--vellum-dim);font-size:clamp(14px,1.6vw,17px)}
.tagline{margin:10px 0 0;color:var(--vellum-dim);max-width:62ch}
.stat-strip{display:flex;flex-wrap:wrap;gap:8px 26px;margin-top:16px;font-family:var(--mono);
  font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--vellum-faint)}
.stat-strip b{color:var(--accent);font-weight:600}

/* kindred switcher */
.kindreds{display:flex;gap:8px;overflow-x:auto;padding:18px 0 8px;scrollbar-width:thin}
.kin{
  flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:9px 15px 9px 11px;
  border:1px solid var(--rule);border-radius:999px;background:var(--ink-2);
  color:var(--vellum-dim);white-space:nowrap;transition:.22s ease;
}
.kin:hover{border-color:color-mix(in srgb,var(--kc) 55%,var(--rule));color:var(--vellum);transform:translateY(-1px)}
.kin .dot{width:11px;height:11px;border-radius:50%;background:var(--kc);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--kc) 22%,transparent);flex:0 0 auto}
.kin[aria-pressed="true"]{
  color:var(--vellum);border-color:color-mix(in srgb,var(--kc) 70%,transparent);
  background:color-mix(in srgb,var(--kc) 12%,var(--ink-2));
}
.kin[aria-pressed="true"] .dot{box-shadow:0 0 0 3px color-mix(in srgb,var(--kc) 34%,transparent),0 0 14px var(--kc)}

/* view tabs + controls */
.bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:space-between;
  padding:10px 0 16px;border-bottom:1px solid var(--rule-soft)}
.tabs{display:flex;gap:2px;background:var(--ink-2);border:1px solid var(--rule);border-radius:999px;padding:3px}
.tab{padding:7px 16px;border-radius:999px;color:var(--vellum-dim);font-size:13.5px;transition:.2s}
.tab:hover{color:var(--vellum)}
.tab[aria-selected="true"]{background:color-mix(in srgb,var(--accent) 18%,var(--ink-3));color:var(--vellum)}
.mini{display:flex;gap:8px;align-items:center}
.chip{padding:6px 12px;border:1px solid var(--rule);border-radius:999px;color:var(--vellum-dim);
  font-size:12.5px;font-family:var(--mono);letter-spacing:.04em;transition:.2s}
.chip:hover{color:var(--vellum);border-color:var(--accent)}
.chip[aria-pressed="true"]{color:var(--ink);background:var(--accent);border-color:var(--accent);font-weight:600}
:root[data-theme="light"] .chip[aria-pressed="true"]{color:#0B0E14}

/* ---------- race intro --------------------------------------------------- */
.race-head{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;padding:22px 0 6px}
.race-head h2{font-size:clamp(24px,3vw,34px);color:var(--accent);letter-spacing:.01em}
.race-head p{margin:8px 0 0;color:var(--vellum-dim);max-width:66ch}
.tallies{display:flex;gap:22px;font-family:var(--mono);font-size:12px;text-transform:uppercase;
  letter-spacing:.07em;color:var(--vellum-faint);text-align:right}
.tallies b{display:block;font-size:21px;color:var(--vellum);letter-spacing:0}

/* ---------- constellation ------------------------------------------------ */
.stage{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px;margin-top:14px}
.canvas-wrap{position:relative;background:
    radial-gradient(1200px 420px at 50% -8%,color-mix(in srgb,var(--accent) 9%,transparent),transparent 70%),
    var(--ink-2);
  border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;min-height:min(74vh,720px);
  box-shadow:var(--shadow)}
svg.map{display:block;width:100%;height:min(74vh,720px);cursor:grab;touch-action:none}
svg.map.drag{cursor:grabbing}
.edge{stroke:var(--rule);stroke-width:1.4;fill:none;opacity:.85}
.edge.hot{stroke:var(--accent);stroke-width:2;opacity:1}
.node{cursor:pointer}
.node .gem{fill:var(--ink-3);stroke:color-mix(in srgb,var(--accent) 45%,var(--rule));stroke-width:1.6;
  transition:fill .2s,stroke .2s,transform .2s;transform-box:fill-box;transform-origin:center}
.node:hover .gem{fill:color-mix(in srgb,var(--accent) 30%,var(--ink-3));stroke:var(--accent)}
.node.sel .gem{fill:var(--accent);stroke:var(--accent)}
.node.deed .gem{stroke-width:2.4;stroke:var(--warn)}
.node .halo{fill:none;stroke:var(--accent);opacity:0;transition:opacity .25s}
.node:hover .halo,.node.sel .halo{opacity:.5}
.node text{font-family:var(--ui);font-size:9.5px;fill:var(--vellum-dim);pointer-events:none}
.node:hover text,.node.sel text{fill:var(--vellum)}
.lane-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  fill:var(--vellum-faint)}
.lane-band{fill:color-mix(in srgb,var(--accent) 4%,transparent)}
.zoomers{position:absolute;right:12px;bottom:12px;display:flex;gap:6px}
.zoomers button{width:34px;height:34px;border:1px solid var(--rule);border-radius:8px;
  background:color-mix(in srgb,var(--ink-3) 88%,transparent);color:var(--vellum-dim);font-size:16px;line-height:1}
.zoomers button:hover{color:var(--vellum);border-color:var(--accent)}
.hint{position:absolute;left:14px;top:12px;font-family:var(--mono);font-size:11px;
  color:var(--vellum-faint);letter-spacing:.05em;pointer-events:none}

/* draw-in animation */
@keyframes drawIn{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(.86)}to{opacity:1;transform:none}}
.anim .edge{stroke-dasharray:var(--len);animation:drawIn .7s ease forwards}
.anim .node{opacity:0;animation:popIn .42s cubic-bezier(.2,.8,.3,1) forwards;
  transform-box:fill-box;transform-origin:center}

/* ---------- inspector ---------------------------------------------------- */
.inspect{background:var(--ink-2);border:1px solid var(--rule);border-radius:var(--r);padding:18px;
  align-self:start;position:sticky;top:16px;max-height:min(74vh,720px);overflow:auto;box-shadow:var(--shadow)}
.inspect .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--vellum-faint)}
.inspect h3{font-size:21px;margin:6px 0 4px;color:var(--accent)}
.inspect .flavor{font-family:var(--display);font-style:italic;color:var(--vellum-dim);margin:0 0 14px}
.facts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.fact{font-family:var(--mono);font-size:11.5px;padding:4px 9px;border:1px solid var(--rule);
  border-radius:6px;color:var(--vellum-dim)}
.fact.gold{border-color:var(--warn);color:var(--warn)}
.eff{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.eff li{display:flex;gap:9px;align-items:baseline;font-size:13.5px;padding-left:2px}
.eff .bullet{width:6px;height:6px;flex:0 0 auto;background:var(--accent);border-radius:1px;
  transform:rotate(45deg);margin-top:6px}
.eff li.ctx .bullet{background:var(--warn)}
.eff li.act .bullet{background:var(--good);border-radius:50%;transform:none}
.sec-t{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--vellum-faint);margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--rule-soft)}
.empty{color:var(--vellum-faint);font-family:var(--display);font-style:italic}

/* ---------- codex table -------------------------------------------------- */
.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0 12px}
input[type=search]{flex:1 1 240px;min-width:0;padding:10px 14px;border-radius:999px;
  border:1px solid var(--rule);background:var(--ink-2);color:var(--vellum);font:inherit}
input[type=search]:focus{outline:none;border-color:var(--accent)}
.tablescroll{overflow-x:auto;border:1px solid var(--rule);border-radius:var(--r);background:var(--ink-2)}
table{border-collapse:collapse;width:100%;min-width:700px}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--rule-soft);vertical-align:top}
th{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--vellum-faint);position:sticky;top:0;background:var(--ink-2);z-index:1}
tbody tr{transition:background .15s}
tbody tr:hover{background:color-mix(in srgb,var(--accent) 8%,transparent);cursor:pointer}
td .nm{font-weight:600}
td .fl{color:var(--vellum-faint);font-family:var(--display);font-style:italic;font-size:13px}
td small{color:var(--vellum-dim)}

/* ---------- compare ------------------------------------------------------ */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:18px}
.card{background:var(--ink-2);border:1px solid var(--rule);border-radius:var(--r);padding:16px 18px;
  border-top:3px solid var(--kc);transition:.22s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.card h3{font-size:19px;color:var(--kc)}
.card p{color:var(--vellum-dim);font-size:13.5px;margin:6px 0 12px}
.metric{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.metric .lab{width:74px;flex:0 0 auto;color:var(--vellum-faint);font-family:var(--mono);font-size:11px;
  letter-spacing:.06em;text-transform:uppercase}
.metric .track{flex:1;height:6px;background:var(--rule-soft);border-radius:3px;overflow:hidden}
.metric .fill{height:100%;background:var(--kc);width:0;transition:width .9s cubic-bezier(.2,.8,.3,1)}
.metric .val{width:38px;text-align:right;font-family:var(--mono);font-size:12px}

/* ---------- rules -------------------------------------------------------- */
.prose{max-width:70ch}
.prose h2{font-size:26px;margin:34px 0 10px}
.prose h3{font-size:18px;margin:24px 0 6px;color:var(--accent)}
.prose p{color:var(--vellum-dim)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
.tile{background:var(--ink-2);border:1px solid var(--rule);border-radius:var(--r);padding:14px 16px}
.tile .k{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--vellum-faint)}
.tile .v{font-family:var(--display);font-size:26px;color:var(--accent);line-height:1.2;margin-top:2px}
.tile .d{font-size:13px;color:var(--vellum-dim);margin-top:6px}
.deedlist{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:12px}
.deed{background:var(--ink-2);border:1px solid var(--rule);border-left:3px solid var(--warn);
  border-radius:var(--r);padding:13px 15px}
.deed b{display:block;font-family:var(--display);font-size:16px;margin-bottom:4px}
.deed span{font-size:13px;color:var(--vellum-dim)}
.warnbox{border:1px solid color-mix(in srgb,var(--bad) 50%,var(--rule));background:
  color-mix(in srgb,var(--bad) 8%,var(--ink-2));border-radius:var(--r);padding:16px 18px;margin:16px 0}
.warnbox b{color:var(--bad)}

footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--rule-soft);
  color:var(--vellum-faint);font-size:12.5px;display:flex;gap:16px;flex-wrap:wrap;justify-content:space-between}

/* ---------- responsive --------------------------------------------------- */
@media (max-width:1020px){
  .stage{grid-template-columns:1fr}
  .inspect{position:static;max-height:none}
  svg.map{height:58vh}
  .race-head{grid-template-columns:1fr}
  .tallies{text-align:left;justify-content:flex-start;flex-wrap:wrap;gap:16px}
}
@media (max-width:560px){
  .wrap{padding:0 14px 48px}
  .tabs{width:100%;justify-content:space-between}
  .tab{flex:1;text-align:center;padding:8px 6px;font-size:12.5px}
  .stat-strip{gap:6px 16px}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important}
  #sky{display:none}
}
</style>

<canvas id="sky"></canvas>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Kindreds of Middle-earth</h1>
      <span class="sub">a skill-tree explorer</span>

    <p class="tagline" id="tagline"></p>
    <div class="stat-strip" id="strip"></div>
    <nav class="kindreds" id="kindreds" aria-label="Choose a kindred"></nav>

    </div>
  </header>

  <main id="view"></main>

  <footer>
    <span id="footL"></span>
    <span id="footR"></span>
  </footer>
</div>

/* ---------------- starfield ---------------- */
(function sky(){
  const c = $('#sky'), x = c.getContext('2d');
  let stars = [];
  function size(){
    c.width = innerWidth * devicePixelRatio; c.height = innerHeight * devicePixelRatio;
    c.style.width = innerWidth+'px'; c.style.height = innerHeight+'px';
    const n = Math.min(190, Math.round(innerWidth*innerHeight/9000));
    stars = Array.from({length:n},()=>({x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.35*devicePixelRatio+.3, p:Math.random()*Math.PI*2, s:.004+Math.random()*.01}));
  }
  function frame(){
    x.clearRect(0,0,c.width,c.height);
    const col = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#B8D8E8';
    for(const st of stars){
      st.p += st.s;
      const a = .18 + Math.abs(Math.sin(st.p))*.55;
      x.globalAlpha = a; x.fillStyle = col;
      x.beginPath(); x.arc(st.x,st.y,st.r,0,7); x.fill();
    }
    x.globalAlpha = 1;
    if(!reduced) requestAnimationFrame(frame);
  }
  size(); addEventListener('resize',size); frame();
})();

function paintAccent(){
  const r = race();
  document.documentElement.style.setProperty('--accent', r.accent);
  document.documentElement.style.setProperty('--accent2', r.accent2);
}
function buildKindreds(){
  const box = $('#kindreds'); box.innerHTML='';
  DATA.order.forEach(id=>{
    const r = DATA.races[id];
    const b = el('button','kin');
    b.style.setProperty('--kc', r.accent);
    b.setAttribute('aria-pressed', String(id===S.race));
    b.append(el('span','dot'), el('span',null, S.lang==='ru'? r.nameRu : r.name));
    b.onclick = ()=>{ S.race=id; S.node=null; S.q=''; S.disc='all'; paintAccent(); buildKindreds(); render(); };
    box.append(b);
  });
}
function buildTabs(){
  const box = $('#tabs'); box.innerHTML='';
  [['map',t('map')],['codex',t('codex')],['compare',t('compare')],['rules',t('rules')]].forEach(([id,label])=>{

  },{n:0,p:0,e:0});

    ? 'Данные взяты прямо из файлов мода'
    : 'Every number on this page is read straight out of the mod’s own data files';

/* ---------------- constellation ---------------- */
const LANE_W = 210, TIER_H = 96, GAP = 128;
function layout(r){
  const lanes = r.disciplines;
  const pos = {}, buckets = {};
  r.nodes.forEach(n=>{ (buckets[n.d+'|'+n.t] ||= []).push(n); });
  Object.values(buckets).forEach(list=> list.sort((a,b)=> a.i.localeCompare(b.i)));
  r.nodes.forEach(n=>{
    const li = lanes.indexOf(n.d);
    const list = buckets[n.d+'|'+n.t];
    const k = list.indexOf(n);
    const spread = (k - (list.length-1)/2) * GAP;
    pos[n.i] = { x: li*LANE_W*1.9 + spread, y: n.t*TIER_H };
  });
  return {pos, lanes};
}
function renderMap(root){
  const r = race(), {pos,lanes} = layout(r);
  const head = el('div','race-head');
  const left = el('div');
  left.append(el('h2', null, S.lang==='ru'? r.nameRu : r.name));
  left.append(el('p', null, S.lang==='ru'? r.blurbRu : r.blurb));
  const tall = el('div','tallies');
  tall.innerHTML = '<div><b class="tnum">'+r.nodes.length+'</b>'+t('nodes')+'</div>'+
                   '<div><b class="tnum">'+r.points+'</b>'+t('points')+'</div>'+
                   '<div><b class="tnum">'+r.actives+'</b>'+t('actives')+'</div>'+
                   '<div><b class="tnum">'+r.disciplines.length+'</b>'+t('lanes')+'</div>';
  head.append(left, tall); root.append(head);

  const stage = el('div','stage');
  const wrap = el('div','canvas-wrap');
  const xs = Object.values(pos).map(p=>p.x), ys = Object.values(pos).map(p=>p.y);
  const minX = Math.min(...xs)-140, maxX = Math.max(...xs)+140;
  const minY = Math.min(...ys)-90, maxY = Math.max(...ys)+80;
  const svgNS='http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('class','map'+(reduced?'':' anim'));
  svg.setAttribute('viewBox', minX+' '+minY+' '+(maxX-minX)+' '+(maxY-minY));
  const g = document.createElementNS(svgNS,'g');
  svg.append(g);

  lanes.forEach((d,i)=>{
    const lx = i*LANE_W*1.9;
    const band = document.createElementNS(svgNS,'rect');
    band.setAttribute('class','lane-band');
    band.setAttribute('x', lx-LANE_W*0.82); band.setAttribute('y', minY+30);
    band.setAttribute('width', LANE_W*1.64); band.setAttribute('height', maxY-minY-30);
    band.setAttribute('rx', 18);
    g.append(band);
    const lab = document.createElementNS(svgNS,'text');
    lab.setAttribute('class','lane-label'); lab.setAttribute('x', lx); lab.setAttribute('y', minY+18);
    lab.setAttribute('text-anchor','middle'); lab.textContent = discName(d).toUpperCase();
    g.append(lab);
  });

  const byId = Object.fromEntries(r.nodes.map(n=>[n.i,n]));
  let ei = 0;
  r.nodes.forEach(n=>{
    n.p.forEach(pr=>{
      if(!byId[pr]) return;
      const a = pos[pr], b = pos[n.i];
      const path = document.createElementNS(svgNS,'path');
      const mid = (a.y+b.y)/2;
      const d = 'M'+a.x+','+a.y+' C'+a.x+','+mid+' '+b.x+','+mid+' '+b.x+','+b.y;
      path.setAttribute('d', d); path.setAttribute('class','edge');
      path.dataset.from = pr; path.dataset.to = n.i;
      const len = Math.hypot(b.x-a.x, b.y-a.y)+60;
      path.style.setProperty('--len', len);
      path.style.animationDelay = (ei++%40)*8+'ms';
      g.append(path);
    });
  });

  r.nodes.forEach((n,idx)=>{
    const p = pos[n.i];
    const grp = document.createElementNS(svgNS,'g');
    grp.setAttribute('class','node'+(n.deed?' deed':''));
    grp.setAttribute('transform','translate('+p.x+','+p.y+')');
    grp.setAttribute('tabindex','0'); grp.setAttribute('role','button');
    grp.setAttribute('aria-label', nodeName(n));
    grp.style.animationDelay = (n.t*55 + (idx%7)*18)+'ms';
    const size = n.deed ? 15 : 11;
    const halo = document.createElementNS(svgNS,'circle');
    halo.setAttribute('class','halo'); halo.setAttribute('r', size+9); halo.setAttribute('stroke-width','1.5');
    const gem = document.createElementNS(svgNS,'rect');
    gem.setAttribute('class','gem'); gem.setAttribute('x',-size/1.42); gem.setAttribute('y',-size/1.42);
    gem.setAttribute('width',size*1.41); gem.setAttribute('height',size*1.41);
    gem.setAttribute('transform','rotate(45)'); gem.setAttribute('rx','2.5');
    const label = document.createElementNS(svgNS,'text');
    label.setAttribute('text-anchor','middle'); label.setAttribute('y', size+15);
    label.textContent = nodeName(n);
    grp.append(halo, gem, label);
    grp.onclick = ()=> select(n.i, svg);
    grp.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); select(n.i, svg); } };
    g.append(grp);
  });

  wrap.append(svg);
  const hint = el('div','hint', S.lang==='ru' ? 'колесо — масштаб · перетаскивание — сдвиг' : 'scroll to zoom · drag to pan');
  const zoomers = el('div','zoomers');
  ['+','−','⟲'].forEach((sym,i)=>{
    const b = el('button',null,sym);
    b.onclick = ()=> i===0? zoom(1.25) : i===1? zoom(.8) : reset();
    zoomers.append(b);
  });
  wrap.append(hint, zoomers);

  const insp = el('aside','inspect'); insp.id='inspector';
  stage.append(wrap, insp); root.append(stage);
  drawInspector();

  // pan / zoom
  let vb = {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
  const base = {...vb};
  const apply = ()=> svg.setAttribute('viewBox', vb.x+' '+vb.y+' '+vb.w+' '+vb.h);
  function zoom(f, cx, cy){
    const nw = Math.min(base.w*2.2, Math.max(base.w*0.18, vb.w/f));
    const nh = nw * (vb.h/vb.w);
    const px = cx==null? .5 : cx, py = cy==null? .5 : cy;
    vb.x += (vb.w-nw)*px; vb.y += (vb.h-nh)*py; vb.w=nw; vb.h=nh; apply();
  }
  function reset(){ vb={...base}; apply(); }
  svg.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    zoom(e.deltaY<0?1.14:1/1.14, (e.clientX-rect.left)/rect.width, (e.clientY-rect.top)/rect.height);
  }, {passive:false});
  let drag=null;
  svg.addEventListener('pointerdown', e=>{ drag={x:e.clientX,y:e.clientY,vx:vb.x,vy:vb.y};
    svg.classList.add('drag'); svg.setPointerCapture(e.pointerId); });
  svg.addEventListener('pointermove', e=>{
    if(!drag) return;
    const rect = svg.getBoundingClientRect();
    vb.x = drag.vx - (e.clientX-drag.x)*(vb.w/rect.width);
    vb.y = drag.vy - (e.clientY-drag.y)*(vb.h/rect.height);
    apply();
  });
  const stop = ()=>{ drag=null; svg.classList.remove('drag'); };
  svg.addEventListener('pointerup', stop); svg.addEventListener('pointercancel', stop);
}
function select(id, svg){
  S.node = id;
  if(svg){
    svg.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
    svg.querySelectorAll('.edge').forEach(e=>e.classList.toggle('hot', e.dataset.to===id||e.dataset.from===id));
    const nodes = [...svg.querySelectorAll('.node')];
    const r = race(); const idx = r.nodes.findIndex(n=>n.i===id);
    if(nodes[idx]) nodes[idx].classList.add('sel');
  }
  drawInspector();
}
function drawInspector(){
  const box = document.getElementById('inspector'); if(!box) return;
  const r = race();
  const n = r.nodes.find(x=>x.i===S.node);
  box.innerHTML = '';
  if(!n){
    box.append(el('div','eyebrow', S.lang==='ru'?'Инспектор':'Inspector'));
    const h = el('h3', null, t('pick')); box.append(h);
    box.append(el('p','flavor', t('pickBody')));
    return;
  }
  box.append(el('div','eyebrow', discName(n.d) + ' · ' + t('tier') + ' ' + n.t));
  box.append(el('h3', null, nodeName(n)));
  if(nodeFlavor(n)) box.append(el('p','flavor', nodeFlavor(n)));
  const facts = el('div','facts');
  facts.append(el('span','fact', n.c + ' ' + t('cost')));
  facts.append(el('span','fact', discName(n.d)));
  if(n.deed) facts.append(el('span','fact gold', t('deed')));
  if(n.x) facts.append(el('span','fact', t('excl')));
  box.append(facts);
  box.append(el('div','sec-t', t('effectsT')));
  const ul = el('ul','eff');
  nodeEffects(n).forEach((line,i)=>{
    const kind = n.k[0];
    const li = el('li', line.includes(':') && /^(under|in|at|под|во|при|на)/i.test(line) ? 'ctx'
              : /^(Active|Умение)/.test(line) ? 'act' : '');
    li.append(el('span','bullet'), el('span',null,line));
    ul.append(li);
  });
  box.append(ul);
  if(n.p.length){
    box.append(el('div','sec-t', t('needs')));
    const list = el('ul','eff');
    n.p.forEach(p=>{
      const pn = r.nodes.find(x=>x.i===p);
      const li = el('li'); li.append(el('span','bullet'), el('span',null, pn? nodeName(pn): p));
      li.style.cursor='pointer'; li.onclick = ()=>{ S.node=p; render(); };
      list.append(li);
    });
    box.append(list);
  }
}

/* ---------------- codex ---------------- */
function renderCodex(root){
  const r = race();
  const tools = el('div','tools');
  const search = el('input'); search.type='search'; search.placeholder=t('search'); search.value=S.q;
  search.oninput = e=>{ S.q = e.target.value; fill(); };
  tools.append(search);
  const all = el('button','chip', t('all')); all.setAttribute('aria-pressed', String(S.disc==='all'));
  all.onclick=()=>{ S.disc='all'; render(); };
  tools.append(all);
  r.disciplines.forEach(d=>{
    const b = el('button','chip', discName(d));
    b.setAttribute('aria-pressed', String(S.disc===d));
    b.onclick=()=>{ S.disc=d; render(); };
    tools.append(b);
  });
  root.append(tools);

  const scroll = el('div','tablescroll');
  const table = el('table');
  table.innerHTML = '<thead><tr><th>'+t('name')+'</th><th>'+t('lane')+'</th><th>'+t('tier')+
    '</th><th>'+t('cost')+'</th><th>'+t('what')+'</th></tr></thead>';
  const tb = el('tbody'); table.append(tb); scroll.append(table); root.append(scroll);

  function fill(){
    const q = S.q.trim().toLowerCase();
    tb.innerHTML='';
    r.nodes
      .filter(n=> S.disc==='all' || n.d===S.disc)
      .filter(n=> !q || nodeName(n).toLowerCase().includes(q) || nodeFlavor(n).toLowerCase().includes(q)
                 || nodeEffects(n).join(' ').toLowerCase().includes(q))
      .sort((a,b)=> a.d.localeCompare(b.d) || a.t-b.t || a.n.localeCompare(b.n))
      .forEach(n=>{
        const tr = el('tr');
        const c1 = el('td');
        c1.append(el('div','nm', nodeName(n)));
        if(nodeFlavor(n)) c1.append(el('div','fl', nodeFlavor(n)));
        tr.append(c1);
        tr.append(el('td', null, discName(n.d)));
        const c3=el('td'); c3.className='tnum'; c3.textContent=n.t; tr.append(c3);
        const c4=el('td'); c4.className='tnum'; c4.textContent=n.c; tr.append(c4);
        const c5 = el('td');
        nodeEffects(n).forEach(line=> c5.append(el('small',null,line), document.createElement('br')));
        tr.append(c5);
        tr.onclick = ()=>{ S.node=n.i; S.view='map'; buildTabs(); render(); };
        tb.append(tr);
      });
  }
  fill();
}

/* ---------------- compare ---------------- */
function renderCompare(root){
  const max = {nodes:0,points:0,effects:0,actives:0,boons:0};
  DATA.order.forEach(id=>{
    const r=DATA.races[id];
    max.nodes=Math.max(max.nodes,r.nodes.length); max.points=Math.max(max.points,r.points);
    max.effects=Math.max(max.effects,r.effects); max.actives=Math.max(max.actives,r.actives);
    max.boons=Math.max(max.boons,r.boons);
  });
  const cards = el('div','cards');
  DATA.order.forEach(id=>{
    const r = DATA.races[id];
    const c = el('div','card'); c.style.setProperty('--kc', r.accent);
    c.append(el('h3',null, S.lang==='ru'? r.nameRu : r.name));
    c.append(el('p',null, S.lang==='ru'? r.blurbRu : r.blurb));
    const rows = [[t('nodes'), r.nodes.length, max.nodes],[t('points'), r.points, max.points],
                  [t('effects'), r.effects, max.effects],[t('actives'), r.actives, max.actives]];
    rows.forEach(([lab,val,mx])=>{
      const m = el('div','metric');
      m.append(el('span','lab',lab));
      const track = el('div','track'); const fill = el('div','fill'); track.append(fill);
      m.append(track);
      const v = el('span','val tnum', String(val)); m.append(v);
      c.append(m);
      requestAnimationFrame(()=>{ fill.style.width = Math.round(val/mx*100)+'%'; });
    });
    c.onclick = ()=>{ S.race=id; S.view='map'; S.node=null; paintAccent(); buildKindreds(); buildTabs(); render(); };
    cards.append(c);
  });
  root.append(cards);
}

/* ---------------- rules ---------------- */
function renderRules(root){
  const r = race();
  const p = el('div','prose');
  const ru = S.lang==='ru';

  p.append(el('h2', null, t('capT')));
  p.append(el('p', null, ru
    ? 'Нельзя освоить всё древо. Предел — это доля вашего собственного древа, поэтому он одинаково честен и для гнома с четырьмя ветвями, и для эльфа с пятью. По умолчанию — 75%: три-четыре ветви, но никогда все.'
    : 'You cannot master your whole tree. The cap is a percentage of your own tree, so it binds a four-lane Dwarf and a five-lane Elf equally. The default is 75% — three or four lanes, never quite all of them.'));
  const tiles = el('div','grid2');
  DATA.order.forEach(id=>{
    const rr = DATA.races[id];
    const cap = Math.round(rr.points*0.75);
    const tl = el('div','tile');
    tl.append(el('div','k', ru? rr.nameRu : rr.name));
    tl.append(el('div','v tnum', cap + ' / ' + rr.points));
    tl.append(el('div','d', ru? 'очков при «Дороге» (75%)' : 'points on The Road (75%)'));
    tiles.append(tl);
  });
  p.append(tiles);

  p.append(el('h2', null, t('diffT')));
  const dg = el('div','grid2');
  DATA.difficulty.forEach(d=>{
    const tl = el('div','tile');
    tl.append(el('div','k', ru? d.ru : d.en));
    tl.append(el('div','v tnum', d.cap===100 ? (ru?'без предела':'no cap') : d.cap+'%'));
    tl.append(el('div','d', (ru? d.noteRu : d.noteEn) + ' · xp ×' + d.xp + ' · ' +
      (ru? 'смерть: '+d.deathRu : 'death: '+d.death)));
    dg.append(tl);
  });
  p.append(dg);

  p.append(el('h2', null, t('renownT')));
  p.append(el('p', null, ru
    ? 'Предел раздвигается не временем, а делами. У каждого народа — свои четыре Великих деяния, каждое даёт +5% к вашему древу. Деяния другого народа не считаются: слава принадлежит тому, кем вы её добыли.'
    : 'The ceiling moves for deeds, not for hours. Every kindred has its own four Great Deeds, each worth +5% of your tree. Another kindred’s deeds do not count — renown belongs to the people you earned it as.'));
  const dl = el('div','deedlist');
  r.deeds.forEach(d=>{
    const c = el('div','deed');
    c.append(el('b',null,d.t)); c.append(el('span',null,d.d));
    dl.append(c);
  });
  p.append(dl);

  p.append(el('h2', null, t('bargainT')));
  const wb = el('div','warnbox');
  wb.innerHTML = ru
    ? '<b>+10% древа — и два сердца, навсегда.</b><br>Сделка предлагается только тому, кто уже упёрся в собственный предел. Её нельзя отменить сбросом древа, очищением или смертью, и сервер объявляет о ней всем: слух расходится.'
    : '<b>+10% of your tree, and two hearts of your life — both forever.</b><br>The Bargain is offered only to someone already standing at their own ceiling. No respec, cleansing or death undoes it, and the server announces it to everyone: word spreads.';
  p.append(wb);

  p.append(el('h2', null, t('ranksT')));
  p.append(el('p', null, ru
    ? 'Некоторые перки повторяются в ветви — и теперь каждый повтор поднимает ранг. Скрытность гоблина: ранг 1 прячет лишь неподвижного, ранг 3 позволяет красться, ранг 5+ оставляет невидимым ещё мгновение после того, как вы поднялись.'
    : 'Some perks repeat down a lane, and every repeat now raises its rank. Goblin camouflage: rank 1 hides you only while you hold still, rank 3 lets you creep, rank 5+ keeps you unseen for a moment after you rise.'));
  root.append(p);
}

/* ---------------- render ---------------- */
function render(){
  buildStrip();
  const root = $('#view'); root.innerHTML='';
  if(S.view==='map') renderMap(root);
  else if(S.view==='codex'){ renderRaceHead(root); renderCodex(root); }
  else if(S.view==='compare') renderCompare(root);
  else renderRules(root);
}
function renderRaceHead(root){
  const r = race();
  const head = el('div','race-head');
  const left = el('div');
  left.append(el('h2',null, S.lang==='ru'? r.nameRu : r.name));
  left.append(el('p',null, S.lang==='ru'? r.blurbRu : r.blurb));
  head.append(left); root.append(head);
}

$('#langBtn').onclick = e => {
  S.lang = S.lang==='en' ? 'ru' : 'en';
  e.currentTarget.setAttribute('aria-pressed', String(S.lang==='ru'));
  e.currentTarget.textContent = S.lang==='en' ? 'EN / RU' : 'RU / EN';
  buildKindreds(); buildTabs(); render();
};
$('#themeBtn').onclick = ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  const dark = cur ? cur==='dark' : matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
};

paintAccent(); buildKindreds(); buildTabs(); render();
</script>
